<!DOCTYPE html>
<html>
<head>
    <title>Create Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #1e3a8a;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        label {
            display: block;
            color: #374151;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        button {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        .hint {
            color: #6b7280;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Your Resume</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Skills</label>
        <input type="text" name="skills" placeholder="Python, JavaScript, HTML, CSS, Django" required>
        <p class="hint">Separate skills with commas</p>

        <label>Experience</label>
        <textarea name="experience" placeholder="Describe your work experience, projects, and achievements..." required></textarea>

        <button type="submit">Find Matching Jobs</button>
    </form>
</div>

</body>
</html>
